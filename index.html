<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gustavo Rodrigues | Consultoria Imobiliária</title>
    
    <style>
        /* RESET TOTAL PARA EVITAR QUE FIQUE RETO OU DESAJUSTADO */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            overflow-x: hidden;
            width: 100%;
        }

        /* HEADER FIXO E AJUSTADO */
        header {
            position: fixed;
            top: 0; width: 100%; height: 80px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 5%; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand { display: flex; align-items: center; gap: 15px; text-decoration: none; color: #fff; }
        .brand img { height: 35px; width: auto; }
        .brand span { font-weight: bold; letter-spacing: 2px; text-transform: uppercase; font-size: 16px; }

        nav { display: flex; align-items: center; gap: 25px; }
        nav a { color: #fff; text-decoration: none; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1.5px; transition: 0.3s; }
        nav a:hover { color: #ED1C24; }

        .btn-vermelho { 
            background: #ED1C24; 
            color: #fff !important;
            padding: 10px 22px; 
            border-radius: 50px; 
            text-decoration: none;
        }

        /* HERO - CENTRO */
        .hero { 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }

        .btn-hero {
            background: #ED1C24;
            color: #fff;
            padding: 22px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: 20px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(237, 28, 36, 0.4);
            z-index: 10;
        }

        /* DESTAQUES DO BLOG */
        .blog-container { 
            padding: 100px 5%; 
            background: rgba(0,0,0,0.8);
            width: 100%;
        }

        .blog-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; 
            max-width: 1200px; 
            margin: 50px auto 0; 
        }

        .card { 
            background: #111; 
            border-radius: 20px; 
            overflow: hidden; 
            border: 1px solid #222;
        }
        .card img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 30px; }
        .card-content h3 { font-size: 17px; text-transform: uppercase; margin-bottom: 20px; line-height: 1.4; }
        .link-blog { color: #ED1C24; text-decoration: none; font-weight: bold; font-size: 12px; text-transform: uppercase; }

        /* CONTACTO */
        .contact-box {
            max-width: 500px;
            margin: 100px auto;
            background: #0a0a0a;
            padding: 45px;
            border-radius: 25px;
            border: 1px solid #222;
        }
        input, textarea { 
            width: 100%; background: #000; border: 1px solid #333; 
            padding: 18px; border-radius: 12px; color: white; margin-bottom: 15px;
        }

        /* FUNDO FIXO */
        .bg-fixed {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; object-fit: cover; opacity: 0.45;
        }
    </style>
</head>

<body>

    <img src="Gustavo Rodrigues _ Consultoria Imobiliária_files/bg1.jpg" class="bg-fixed">

    <header>
        <a href="#" class="brand">
            <img src="Gustavo Rodrigues _ Consultoria Imobiliária_files/brand-logo.png">
            <span>Gustavo Rodrigues</span>
        </a>
        <nav>
            <a href="#">Início</a>
            <a href="#blog">Blog</a>
            <a href="#contacto">Contacto</a>
            <a href="#contacto" class="btn-vermelho">Avaliar</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <a href="#contacto" class="btn-hero">AVALIAÇÃO EM SEGUNDOS</a>
        </section>

        <section id="blog" class="blog-container">
            <h2 style="text-align: center; color: #ED1C24; text-transform: uppercase; letter-spacing: 3px;">Destaques do Blog</h2>
            <div class="blog-grid">
                <div class="card">
                    <img src="Gustavo Rodrigues _ Consultoria Imobiliária_files/post1.jpg">
                    <div class="card-content">
                        <h3>Como poupar 10.000€ na compra da sua casa</h3>
                        <a href="Gustavo Rodrigues _ Consultoria Imobiliária_files/como-poupar-10000-na-compra-da-sua-casa-em-lisboa.html" class="link-blog">Ler Artigo →</a>
                    </div>
                </div>
                <div class="card">
                    <img src="Gustavo Rodrigues _ Consultoria Imobiliária_files/post3.jpg">
                    <div class="card-content">
                        <h3>5 Erros comuns a evitar ao vender o seu imóvel</h3>
                        <a href="Gustavo Rodrigues _ Consultoria Imobiliária_files/5-erros-comuns-a-evitar-ao-vender-o-seu-imovel.html" class="link-blog">Ler Artigo →</a>
                    </div>
                </div>
                <div class="card">
                    <img src="Gustavo Rodrigues _ Consultoria Imobiliária_files/post6.jpg">
                    <div class="card-content">
                        <h3>Investir no mercado de Lisboa em 2026</h3>
                        <a href="Gustavo Rodrigues _ Consultoria Imobiliária_files/por-que-investir-no-mercado-imobiliario-de-lisboa-em-2024.html" class="link-blog">Ler Artigo →</a>
                    </div>
                </div>
            </div>
        </section>

        <section id="contacto" style="padding-bottom: 100px;">
            <div class="contact-box">
                <h2 style="text-align:center; margin-bottom:35px; color:#ED1C24; text-transform:uppercase;">Contacto</h2>
                <form action="https://formspree.io/f/mreykwej" method="POST">
                    <input name="name" placeholder="NOME" required>
                    <input name="email" type="email" placeholder="EMAIL" required>
                    <textarea name="message" placeholder="A SUA MENSAGEM" rows="4" required></textarea>
                    <button type="submit" class="btn-vermelho" style="width:100%; padding:18px; border:none; cursor:pointer; font-weight:bold; text-transform:uppercase;">Enviar Mensagem</button>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
